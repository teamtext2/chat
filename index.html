<!DOCTYPE html>
<html lang="vi">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3375983939015019" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Text2Chat</title>
    <!-- Premium font for exact matches to the typography in the screenshot -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS resets and base styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0b0c0e;
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* App container centered on desktop, full screen on mobile */
        .app-container {
            width: 100%;
            max-width: 480px; /* Portrait mobile screen ratio */
            height: 100vh;
            max-height: 960px;
            background: linear-gradient(110deg, #000000 0%, #060708 35%, #464a4f 100%);
            display: flex;
            flex-direction: column;
            padding: 50px 24px;
            position: relative;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow-y: auto;
        }

        /* Scrollbar styling */
        .app-container::-webkit-scrollbar {
            width: 4px;
        }
        .app-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .app-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        @media (max-width: 480px) {
            body {
                background-color: #000000;
            }
            .app-container {
                max-width: 100%;
                height: 100vh;
                max-height: 100vh;
                border: none;
                box-shadow: none;
                padding: 40px 20px;
            }
        }

        /* Header Layout */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 52px; /* Spacing between header and the first chat item */
        }

        .logo-text {
            font-size: 25px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Circular Search Button */
        .btn-search {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1.2px solid rgba(255, 255, 255, 0.38);
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .btn-search:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.6);
            transform: scale(1.05);
        }

        .btn-search:active {
            transform: scale(0.95);
        }

        /* Pill profile button */
        .btn-profile-pill {
            height: 44px;
            padding: 3px 18px 3px 3px;
            border-radius: 22px;
            border: 1.2px solid rgba(255, 255, 255, 0.38);
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-profile-pill:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.6);
            transform: scale(1.03);
        }

        .btn-profile-pill:active {
            transform: scale(0.97);
        }

        .pill-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }

        .pill-arrow {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            transition: transform 0.2s ease;
        }

        .btn-profile-pill:hover .pill-arrow {
            transform: translateX(3px);
        }

        /* Chat List */
        .chat-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
            width: 100%;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 16px;
            padding: 4px;
        }

        .chat-item:hover {
            background: rgba(255, 255, 255, 0.03);
            transform: translateX(4px);
        }

        .avatar-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-avatar {
            width: 74px;
            height: 74px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }

        /* Green status/outline border for HOA NHAT ANH avatar */
        .chat-item.has-status-border .chat-avatar {
            border: 2px solid #005039; /* Deep teal/green border exactly like screenshot */
            padding: 1.5px;
            background-color: transparent;
        }

        .chat-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chat-name {
            font-size: 19px;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: -0.2px;
        }

        .chat-last-msg {
            font-size: 14px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo-text">Text2Chat</div>
            
            <div class="header-actions">
                <!-- Search & Spark Icon Button -->
                <button class="btn-search" aria-label="Tìm kiếm">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- Magnifying glass path -->
                        <path d="M11 17C14.3137 17 17 14.3137 17 11C17 7.68629 14.3137 5 11 5C7.68629 5 5 7.68629 5 11C5 14.3137 7.68629 17 11 17Z" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M15.5 15.5L20 20" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        <!-- Sparkle Star in the top right -->
                        <path d="M19 2 Q19 5 22 5 Q19 5 19 8 Q19 5 16 5 Q19 5 19 2 Z" fill="white"/>
                    </svg>
                </button>
                
                <!-- Profile Pill Button (linking to profile photo and an action) -->
                <button class="btn-profile-pill" aria-label="Tài khoản">
                    <img class="pill-avatar" src="assets/avatar_hoa.png" alt="Profile">
                    <span class="pill-arrow">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M5 12H19" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M12 5L19 12L12 19" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                </button>
            </div>
        </header>

        <!-- Chat Conversations List -->
        <main class="chat-list">
            <!-- HOA NHAT ANH -->
            <div class="chat-item has-status-border">
                <div class="avatar-wrapper">
                    <img class="chat-avatar" src="assets/avatar_hoa.png" alt="HOA NHAT ANH">
                </div>
                <div class="chat-info">
                    <h2 class="chat-name">HOA NHAT ANH</h2>
                    <span class="chat-last-msg">Last messing</span>
                </div>
            </div>

            <!-- People -->
            <div class="chat-item">
                <div class="avatar-wrapper">
                    <img class="chat-avatar" src="assets/avatar_people.png" alt="People">
                </div>
                <div class="chat-info">
                    <h2 class="chat-name">People</h2>
                    <span class="chat-last-msg">Last messing</span>
                </div>
            </div>

            <!-- Text2 -->
            <div class="chat-item">
                <div class="avatar-wrapper">
                    <img class="chat-avatar" src="assets/avatar_text2.png" alt="Text2">
                </div>
                <div class="chat-info">
                    <h2 class="chat-name">Text2</h2>
                    <span class="chat-last-msg">Last messing</span>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
