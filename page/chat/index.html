<!DOCTYPE html>
<html lang="vi">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3375983939015019" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Chat - Text2Chat</title>
    <!-- Google Fonts for typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS resets and variables */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0b0c0e;
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* App container matching the mobile aspect ratio */
        .app-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 960px;
            background: linear-gradient(110deg, #000000 0%, #060708 35%, #464a4f 100%);
            display: flex;
            flex-direction: column;
            padding: 50px 24px 40px 24px;
            position: relative;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        @media (max-width: 480px) {
            body {
                background-color: #000000;
            }
            .app-container {
                max-width: 100%;
                height: 100vh;
                max-height: 100vh;
                border: none;
                box-shadow: none;
                padding: 40px 20px 30px 20px;
            }
        }

        /* Header Layout */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 44px;
        }

        /* Circular Back Button */
        .btn-back {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 1.2px solid rgba(255, 255, 255, 0.38);
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.6);
            transform: scale(1.05);
        }

        .btn-back:active {
            transform: scale(0.95);
        }

        /* Pill profile button */
        .btn-profile-pill {
            height: 52px;
            padding: 4px 6px 4px 4px;
            border-radius: 26px;
            border: 1.2px solid rgba(255, 255, 255, 0.38);
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-profile-pill:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.6);
            transform: scale(1.03);
        }

        .btn-profile-pill:active {
            transform: scale(0.97);
        }

        .pill-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* Circular background for arrow inside pill */
        .pill-arrow-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            transition: all 0.2s ease;
        }

        .btn-profile-pill:hover .pill-arrow-circle {
            background: rgba(255, 255, 255, 0.28);
            transform: scale(1.05);
        }

        /* Chat Content area */
        .chat-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 22px;
            overflow-y: auto;
            margin-bottom: 30px;
            padding-right: 4px;
        }

        /* Scrollbar styling for message area */
        .chat-content::-webkit-scrollbar {
            width: 4px;
        }
        .chat-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
        }

        /* Placeholder Chat Bubbles matching the solid grey mockup design */
        .chat-bubble-placeholder {
            height: 52px;
            border-radius: 26px;
            background: rgba(255, 255, 255, 0.15); /* Semi-transparent grey matching the image */
            transition: background 0.2s ease;
        }

        .chat-bubble-placeholder:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Left-aligned bubble (Incoming) */
        .bubble-left {
            width: 78%;
            margin-right: auto;
        }

        /* Right-aligned bubble (Outgoing) */
        .bubble-right {
            width: 80%;
            margin-left: auto;
        }

        /* Bottom Input Bar */
        .bottom-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .input-wrapper {
            flex-grow: 1;
            position: relative;
        }

        .message-input {
            width: 100%;
            height: 48px;
            border-radius: 24px;
            border: 1.2px solid rgba(255, 255, 255, 0.38);
            background: transparent;
            padding: 0 24px;
            color: #ffffff;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
        }

        .message-input::placeholder {
            color: rgba(255, 255, 255, 0.42);
        }

        .message-input:focus {
            border-color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.02);
        }

        /* Plus Action Button */
        .btn-plus {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1.2px solid rgba(255, 255, 255, 0.38);
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: #ffffff;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-plus:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.6);
            transform: scale(1.05);
        }

        .btn-plus:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <!-- Circular Back Button -->
            <button class="btn-back" onclick="window.history.back()" aria-label="Quay lại">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19 12H5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 19L5 12L12 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            
            <!-- User Profile Pill (shows "People" avatar) -->
            <button class="btn-profile-pill" aria-label="Thông tin liên hệ">
                <img class="pill-avatar" src="../../assets/avatar_people.png" alt="People Profile">
                <div class="pill-arrow-circle">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12H19" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 5L19 12L12 19" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </button>
        </header>

        <!-- Chat Bubble Placeholders -->
        <main class="chat-content">
            <!-- Bubble 1 (Left / Incoming) -->
            <div class="chat-bubble-placeholder bubble-left"></div>
            
            <!-- Bubble 2 (Right / Outgoing) -->
            <div class="chat-bubble-placeholder bubble-right"></div>
            
            <!-- Bubble 3 (Left / Incoming) -->
            <div class="chat-bubble-placeholder bubble-left" style="width: 75%;"></div>
            
            <!-- Bubble 4 (Right / Outgoing) -->
            <div class="chat-bubble-placeholder bubble-right" style="width: 78%;"></div>
        </main>

        <!-- Bottom Input Bar -->
        <footer class="bottom-bar">
            <div class="input-wrapper">
                <input type="text" class="message-input" placeholder="Messsss......" aria-label="Nhập tin nhắn">
            </div>
            <button class="btn-plus" aria-label="Thêm nội dung">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 5V19" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M5 12H19" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </footer>
    </div>

</body>
</html>
