<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="google" content="notranslate">
    <title>Chat - Text2Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="data/css/chat.css?v=2">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <!-- Back button linking to main index page -->
            <a href="../../index.html" class="btn-back" style="text-decoration: none; display: flex; justify-content: center; align-items: center;" aria-label="Back">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19 12H5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M12 19L5 12L12 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </a>

            <!-- User Profile Pill -->
            <button class="btn-profile-pill" aria-label="Contact details">
                <img class="pill-avatar" src="https://text2.co/post/hoanhatanh/apple-touch-icon.png" alt="Profile">
                <span class="pill-name">HOA NHAT ANH</span>
                <div class="pill-arrow-circle">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12H19" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M12 5L19 12L12 19" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
            </button>
        </header>

        <!-- Chat Content Area -->
        <main class="chat-content">
            <div class="chat-bubble-placeholder bubble-left"></div>
            <div class="chat-bubble-placeholder bubble-right"></div>
            <div class="chat-bubble-placeholder bubble-left"></div>
            <div class="chat-bubble-placeholder bubble-right"></div>
            <div class="chat-bubble-placeholder bubble-left"></div>
        </main>

        <!-- Bottom Input Bar -->
        <footer class="bottom-bar">
            <div class="input-wrapper">
                <!-- Emoji Trigger -->
                <button class="input-action-btn btn-emoji" id="btn-chat-emoji" aria-label="Add emoji" type="button">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                        <line x1="9" y1="9" x2="9.01" y2="9"></line>
                        <line x1="15" y1="9" x2="15.01" y2="9"></line>
                    </svg>
                </button>
                <textarea class="message-input" id="chat-message-input" placeholder="Type a message..." aria-label="Type a message" rows="1"></textarea>
                <!-- Attachment Trigger -->
                <button class="input-action-btn btn-attachment" id="btn-chat-attach" aria-label="Attach file" type="button">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                    </svg>
                </button>
            </div>
            <button class="btn-plus" id="btn-chat-send" aria-label="Send message">
                <svg id="plus-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 5V19" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M5 12H19" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
        </footer>
    </div>

    <script src="data/js/chat.js?v=2"></script>
</body>
</html>
